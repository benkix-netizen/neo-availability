<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neo — Roster</title>
<style>
  :root {
    --accent: #c6ff3d;
    --accent-dim: #3a1a66;
    --bg: #050506;
    --card: #0c0c11;
    --card-border: #29293a;
    --text: #f5f5f7;
    --text-dim: #8d8da0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 60px;
  }
  header {
    padding: 28px 20px 20px;
    text-align: center;
    background: linear-gradient(135deg, var(--accent-dim), var(--bg));
    border-bottom: 1px solid var(--card-border);
  }
  header h1 { margin: 0 0 4px; font-size: 1.6rem; letter-spacing: 0.5px; color: var(--accent); }
  header p { margin: 0; color: var(--text-dim); font-size: 0.9rem; }
  header a.form-link {
    display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 600;
    color: var(--accent); text-decoration: none; letter-spacing: 0.3px;
  }
  header a.form-link:hover { text-decoration: underline; }

  .container { max-width: 760px; margin: 0 auto; padding: 20px; }

  .picker-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .picker-row label { font-size: 0.85rem; color: var(--text-dim); }
  select {
    padding: 10px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text); font-size: 0.95rem;
  }

  .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .month-arrow {
    flex-shrink: 0; width: 34px; height: 34px; font-size: 15px; border: 1px solid var(--card-border);
    border-radius: 999px; cursor: pointer; background: var(--card);
    color: var(--accent); font-family: inherit; transition: all 0.12s;
  }
  .month-arrow:hover { background: var(--accent); color: #101405; }
  .month-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .month-chip {
    padding: 6px 16px; font-size: 0.85rem; border: 1px solid var(--card-border);
    border-radius: 999px; cursor: pointer; background: var(--card);
    color: var(--text-dim); font-family: inherit; transition: all 0.12s;
  }
  .month-chip.active { background: var(--accent); border-color: var(--accent); color: #101405; font-weight: 600; }

  .my-sets-bar {
    display: none; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--card-border); border-radius: 10px;
    padding: 0.9rem 1.1rem; margin-bottom: 20px;
  }
  .my-sets-bar.show { display: flex; }
  .my-sets-bar .msg { font-size: 0.85rem; color: var(--text-dim); }

  .event-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 18px; margin-bottom: 18px;
  }
  .event-card h2 { margin: 0 0 10px; font-size: 1.15rem; }

  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.84rem; }
  table caption {
    text-align: left; font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-dim); margin-bottom: 6px; caption-side: top;
  }
  th, td { text-align: left; padding: 8px 6px; border-top: 1px solid var(--card-border); vertical-align: top; }
  th { color: var(--text-dim); font-weight: 500; font-size: 0.78rem; }
  th.time-col, td.time-col { font-size: 0.8rem; white-space: nowrap; }
  tr.mine td { background: rgba(198, 255, 61, 0.12); font-weight: 600; }
  .assigned-blank { color: var(--text-dim); font-style: italic; font-weight: 400; }

  .cal-btn {
    background: var(--accent); color: #101405; border: none; border-radius: 6px;
    padding: 4px 10px; font-size: 0.75rem; cursor: pointer; font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
  }
  .cal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .cal-btn.small { font-size: 0.72rem; padding: 4px 9px; }
  .cal-btn.swap { background: transparent; border: 1px solid #ffb74d; color: #ffb74d; }
  .cal-btn.swap:hover:not(:disabled) { background: #ffb74d; color: #1a0f00; }
  .cal-btn.report { background: transparent; border: 1px solid #6ec6ff; color: #6ec6ff; }
  .cal-btn.report:hover:not(:disabled) { background: #6ec6ff; color: #04101a; }

  .actions-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .no-email-note { font-size: 0.72rem; color: #ff8080; }
  .swap-status { font-size: 0.72rem; color: #ffb74d; }
  .swap-badge {
    display: inline-flex; align-items: center; gap: 4px; width: fit-content;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.3px;
    color: #ffb74d; background: rgba(255, 183, 77, 0.12);
    border: 1px solid rgba(255, 183, 77, 0.4); border-radius: 999px; padding: 2px 8px; margin-top: 4px;
  }
  .volunteer-list { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; }

  .time-report-form {
    display: none; flex-wrap: wrap; align-items: flex-end; gap: 10px;
    background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px;
    padding: 10px 12px; margin-top: 6px;
  }
  .time-report-form.show { display: flex; }
  .time-report-form label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.3px;
  }
  .time-report-form input {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 0.8rem; padding: 6px 8px;
  }
  .time-report-form input[type="text"] { min-width: 160px; }
  .tr-status { font-size: 0.68rem; color: #6ec6ff; }

  .promo-section { margin-top: 1.75rem; }
  .promo-label {
    font-size: 0.75rem; font-weight: 600; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
  }
  .promo-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .promo-btn-dates { opacity: 0.7; font-weight: 400; }

  .empty-state { text-align: center; color: var(--text-dim); padding: 40px 20px; }
</style>
</head>
<body>

<header>
  <h1>Neo</h1>
  <p>Roster</p>
  <a class="form-link" href="index.html">Submit Availability →</a>
</header>

<div class="container">
  <div class="picker-row">
    <label for="crew-picker">Highlight my slots:</label>
    <select id="crew-picker">
      <option value="">Everyone</option>
    </select>
  </div>

  <div class="month-nav">
    <button class="month-arrow" id="month-prev" aria-label="Previous month">‹</button>
    <div class="month-picker" id="month-picker"></div>
    <button class="month-arrow" id="month-next" aria-label="Next month">›</button>
  </div>

  <div class="my-sets-bar" id="my-sets-bar">
    <span class="msg" id="my-sets-msg"></span>
    <button class="cal-btn" id="add-all-btn">Add all my sets to Calendar</button>
  </div>

  <div id="event-list"></div>

  <div class="promo-section" id="promo-section">
    <div class="promo-label">Share this month</div>
    <div class="promo-buttons" id="promo-buttons"></div>
  </div>
</div>

<script>
const SHEET_ID = "1hw_Pa2fzNC18LoXNs2BPZA1caFtNi2-gxE7wYj9AhXs";
const CREW_SHEET_NAME = "Crew";
const SWAP_SHEET_NAME = "SwapRequests";
const TZ = "Australia/Melbourne";
const VENUE_NAME = "Neo";
const ORGANIZER_EMAIL = "benki@redlineartistry.com";
// Deployed from the Apps Script backend handed over alongside this repo --
// see that file's header comment for the setup/deploy steps.
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjlqaI-WxEIf7gML88mVzMbxcWlbSNDEuZ-l5kF_HGqz_Bw35pzwijQQ4GLQGFr1MJDA/exec";

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Fixed rendering order -- MC + the 5 time-based DJ slots make up
// "Entertainment"; the 3 whole-night roles make up "Media".
const ENTERTAINMENT_ROLES = ["MC", "Open", "Premain", "Main 1", "Main 2", "Close"];
const MEDIA_ROLES = ["Photographer", "Social Media", "Videographer"];
const ALL_SLOT_ROLES = [...ENTERTAINMENT_ROLES, ...MEDIA_ROLES];

function tabName(monthIdx, year) {
  return `${MONTH_ABBR[monthIdx].toUpperCase()} ${String(year).slice(-2)}`;
}

function parseCsv(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

// Returns [] for a tab name that doesn't exist yet -- gviz serves an HTML
// error page (not CSV) in that case, which we treat as "nothing there".
// headers=0 is used for the monthly grid tabs (they have no real header row
// -- row 0 is a merged title cell, and columns are read positionally, not by
// name), but a tab with genuine named headers over real Date-typed columns
// (like SwapRequests) needs headers=1 -- otherwise gviz blanks out the
// header cells it thinks are dates, breaking indexHeader()'s name lookup.
async function fetchCsvBySheetName(name, headers = 0) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&headers=${headers}&_=${Date.now()}`;
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return [];
    const rows = parseCsv(await res.text());
    if (rows.length && /<html/i.test(rows[0][0] || "")) return [];
    return rows;
  } catch (err) {
    return [];
  }
}

function indexHeader(headerRow) {
  const idx = {};
  headerRow.forEach((h, i) => { idx[String(h).trim()] = i; });
  return idx;
}

const DATE_CELL_RE = /^(\d{2})-([A-Za-z]{3})-(\d{2})$/;

function parseGridDateCell(cell) {
  const m = DATE_CELL_RE.exec(String(cell || "").trim());
  if (!m) return null;
  const day = parseInt(m[1], 10);
  const monthIdx = MONTH_ABBR.indexOf(m[2]);
  if (monthIdx === -1) return null;
  const year = 2000 + parseInt(m[3], 10);
  return `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

// Each monthly tab is a hand-formatted grid: a week-header row (col A blank,
// cols B-D all repeating the same "DD-Mon-YY" date), followed by role rows
// (Role, Start, End, Assigned) until the next week-header row. Section-marker
// rows ("", "", "", "DJ") and ("Media", "", "", "Staff") don't match any known
// role name, so they're skipped naturally rather than needing special-casing.
function parseMonthGrid(rows) {
  const slots = [];
  let currentDate = null;
  rows.forEach(r => {
    const a = (r[0] || "").trim();
    const b = (r[1] || "").trim();
    const c = (r[2] || "").trim();
    const d = (r[3] || "").trim();
    if (a === "" && b && b === c && c === d && parseGridDateCell(b)) {
      currentDate = parseGridDateCell(b);
      return;
    }
    if (!currentDate) return;
    if (ALL_SLOT_ROLES.includes(a)) {
      slots.push({ date: currentDate, role: a, start: b, end: c, assigned: d });
    }
  });
  return slots;
}

// gviz silently falls back to the spreadsheet's FIRST tab when a requested
// sheet name doesn't exist (rather than erroring), so a plain fetch-succeeded
// check isn't enough -- a not-yet-created future month would otherwise render
// whatever tab happens to be first. The title cell (e.g. "November 2026")
// must actually match the requested month.
function monthGridMatches(rows, monthIdx, year) {
  const title = (rows[0] && rows[0][0] || "").trim();
  return title.toLowerCase() === `${MONTHS[monthIdx]} ${year}`.toLowerCase();
}

async function fetchMonthSlots(monthIdx, year) {
  const rows = await fetchCsvBySheetName(tabName(monthIdx, year));
  if (rows.length === 0 || !monthGridMatches(rows, monthIdx, year)) return null;
  return parseMonthGrid(rows);
}

async function fetchCrew() {
  const rows = await fetchCsvBySheetName(CREW_SHEET_NAME);
  if (rows.length < 2) return { names: [], emailMap: {} };
  const idx = indexHeader(rows[0]);
  const names = new Set();
  const emailMap = {};
  rows.slice(1).forEach(r => {
    const name = (r[idx["Name"]] || "").trim();
    if (!name) return;
    const active = (r[idx["Active"]] || "").trim().toUpperCase();
    if (active === "FALSE") return;
    names.add(name);
    const email = (r[idx["Email"]] || "").trim();
    if (email) emailMap[name] = email;
  });
  return { names: [...names].sort(), emailMap };
}

// Only "open" requests matter here -- once the owner reassigns the slot by
// hand in the roster grid and flips Status to "resolved" in the sheet, it
// drops out of this map and the badge/buttons disappear on the next load.
function parseSwapMap(rows) {
  const map = {};
  if (!rows || rows.length < 2) return map;
  const idx = indexHeader(rows[0]);
  rows.slice(1).forEach(r => {
    if ((r[idx["Status"]] || "").trim() !== "open") return;
    const date = (r[idx["Date"]] || "").trim();
    const role = (r[idx["Role"]] || "").trim();
    if (!date || !role) return;
    const requestedBy = (r[idx["Name"]] || "").trim();
    const volunteers = (r[idx["Volunteers"]] || "").split(",").map(s => s.trim()).filter(Boolean);
    map[`${date}|${role}`] = { requestedBy, volunteers, date, role };
  });
  return map;
}

function groupIntoEvents(slots) {
  const byDate = {};
  slots.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = { date: s.date, slots: [] };
    byDate[s.date].slots.push(s);
  });
  return Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function escapeXml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function slugify(str) {
  return String(str).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

function formatDateDisplay(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString("en-AU", { weekday: "long", day: "numeric", month: "long" });
}

function todayIso() {
  return new Date().toLocaleDateString("en-CA", { timeZone: TZ });
}

// Reporting only makes sense once a set has actually happened.
function slotHasPassed(dateIso) {
  return dateIso < todayIso();
}

// Fire-and-forget, same as the availability form's submit -- Apps Script
// Web Apps don't reliably send CORS headers on POST responses, so we post
// with no-cors (opaque response) and update the UI optimistically.
async function postToScript(payload) {
  await fetch(SCRIPT_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
}

// ---- .ics calendar export ----

function parseClockFlexible(str) {
  str = String(str).trim();
  let m = /^(\d{1,2}):(\d{2})$/.exec(str);
  if (m) {
    const hour = parseInt(m[1], 10);
    const minute = parseInt(m[2], 10);
    if (hour >= 0 && hour <= 23) return { hour, minute };
  }
  return null;
}

// Nightclub-hours rule: a time before 6am belongs to the night after the
// slot's own Date (e.g. Close at 02:00 on a Friday means 2am Saturday).
function clockToDate(clock, dateIso) {
  const [y, m, d] = dateIso.split("-").map(Number);
  const dayOffset = clock.hour < 6 ? 1 : 0;
  return new Date(y, m - 1, d + dayOffset, clock.hour, clock.minute, 0, 0);
}

function tzOffsetMinutes(date, timeZone) {
  const dtf = new Intl.DateTimeFormat("en-US", {
    timeZone, hour12: false,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
  const parts = dtf.formatToParts(date).reduce((acc, p) => { acc[p.type] = p.value; return acc; }, {});
  const hour = parts.hour === "24" ? "00" : parts.hour;
  const asUTC = Date.UTC(parts.year, parts.month - 1, parts.day, hour, parts.minute, parts.second);
  return (asUTC - date.getTime()) / 60000;
}

function melbourneLocalToUtc(localDate) {
  const guessUtc = new Date(Date.UTC(
    localDate.getFullYear(), localDate.getMonth(), localDate.getDate(),
    localDate.getHours(), localDate.getMinutes(), 0
  ));
  const offsetMin = tzOffsetMinutes(guessUtc, TZ);
  return new Date(guessUtc.getTime() - offsetMin * 60000);
}

function icsDate(date) {
  const pad = n => String(n).padStart(2, "0");
  return `${date.getUTCFullYear()}${pad(date.getUTCMonth() + 1)}${pad(date.getUTCDate())}T${pad(date.getUTCHours())}${pad(date.getUTCMinutes())}${pad(date.getUTCSeconds())}Z`;
}

function icsEscape(str) {
  return String(str || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
}

function buildVevent(slot, name, email) {
  const startClock = parseClockFlexible(slot.start);
  if (!startClock) return null;
  // Close has no End time in the sheet -- default to a 2-hour block so it's
  // still a usable calendar entry instead of a zero-length one.
  const endClock = parseClockFlexible(slot.end) || { hour: (startClock.hour + 2) % 24, minute: startClock.minute };

  const startLocal = clockToDate(startClock, slot.date);
  let endLocal = clockToDate(endClock, slot.date);
  if (endLocal <= startLocal) endLocal = new Date(endLocal.getTime() + 24 * 60 * 60 * 1000);

  const startUtc = melbourneLocalToUtc(startLocal);
  const endUtc = melbourneLocalToUtc(endLocal);

  const uid = `${slot.date}-${slot.role}-${slot.start}-${icsEscape(name)}@neo.redlinerostering`.replace(/\s+/g, "");
  return [
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${icsDate(new Date())}`,
    `DTSTART:${icsDate(startUtc)}`,
    `DTEND:${icsDate(endUtc)}`,
    `SUMMARY:${icsEscape(VENUE_NAME)} — ${icsEscape(slot.role)}`,
    `LOCATION:${icsEscape(VENUE_NAME)}`,
    `ORGANIZER;CN=${icsEscape(VENUE_NAME)}:mailto:${ORGANIZER_EMAIL}`,
    email ? `ATTENDEE;CN=${icsEscape(name)};RSVP=TRUE:mailto:${email}` : "",
    "STATUS:CONFIRMED",
    "END:VEVENT"
  ].filter(Boolean).join("\r\n");
}

function buildIcs(vevents) {
  return ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Redline Neo//Roster//EN", "CALSCALE:GREGORIAN", ...vevents, "END:VCALENDAR"].join("\r\n");
}

function downloadIcs(filename, vevents) {
  const blob = new Blob([buildIcs(vevents)], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function formatShortTime(str) {
  const clock = parseClockFlexible(str);
  if (!clock) return escapeHtml(str);
  let h = clock.hour % 12;
  if (h === 0) h = 12;
  const suffix = clock.hour < 12 ? "am" : "pm";
  const mins = clock.minute ? ":" + String(clock.minute).padStart(2, "0") : "";
  return `${h}${mins}${suffix}`;
}

function timeSortKey(str) {
  const clock = parseClockFlexible(str);
  if (!clock) return 0;
  const h = clock.hour < 6 ? clock.hour + 24 : clock.hour;
  return h * 60 + clock.minute;
}

// ---- Instagram Story promo image export ----
// 1080x1920. Uses system fonts, not custom web fonts -- @import fonts inside
// an SVG often fail to load when rasterized via <img>+canvas, so this
// favours reliability over exactly matching the page's own font.

function buildStorySvg(ev, monthLabel) {
  const W = 1080, H = 1920;
  const lines = [];
  let y = 490;
  const dateLabel = formatDateDisplay(ev.date);

  lines.push(`<text x="90" y="${y}" font-family="Georgia, serif" font-weight="700" font-size="46" fill="#c6ff3d">${escapeXml(dateLabel)}</text>`);
  y += 20;
  lines.push(`<line x1="90" y1="${y}" x2="990" y2="${y}" stroke="#29293a" stroke-width="2"/>`);
  y += 56;

  ev.slots.slice().sort((a, b) => ALL_SLOT_ROLES.indexOf(a.role) - ALL_SLOT_ROLES.indexOf(b.role)).forEach(slot => {
    const name = slot.assigned || "Unassigned";
    const color = slot.assigned ? "#ffffff" : "#6a6a78";
    const style = slot.assigned ? "" : ' font-style="italic"';
    const timeText = slot.end ? `${formatShortTime(slot.start)}–${formatShortTime(slot.end)}` : formatShortTime(slot.start);
    lines.push(`<text x="90" y="${y}" font-family="Segoe UI, sans-serif" font-size="30" fill="#a8a8b8">${escapeXml(slot.role)} · ${escapeXml(timeText)}</text>`);
    lines.push(`<text x="990" y="${y}" text-anchor="end" font-family="Segoe UI, sans-serif" font-weight="700" font-size="32" fill="${color}"${style}>${escapeXml(name)}</text>`);
    y += 62;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="storyBg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0d0710"/>
        <stop offset="55%" stop-color="#1a0f2e"/>
        <stop offset="100%" stop-color="#050506"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#storyBg)"/>
    <g stroke="#c6ff3d" stroke-width="3" fill="none" opacity="0.85">
      <path d="M 50 170 V 90 Q 50 60 80 60 H 160"/>
      <path d="M 920 60 H 1000 Q 1030 60 1030 90 V 170"/>
      <path d="M 1030 ${H - 170} V ${H - 90} Q 1030 ${H - 60} 1000 ${H - 60} H 920"/>
      <path d="M 160 ${H - 60} H 80 Q 50 ${H - 60} 50 ${H - 90} V ${H - 170}"/>
    </g>
    <text x="540" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="30" letter-spacing="8" fill="#c6ff3d">NEO</text>
    <text x="540" y="290" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="70" fill="#ffffff">${escapeXml(monthLabel)}</text>
    <line x1="440" y1="340" x2="640" y2="340" stroke="#c6ff3d" stroke-width="2"/>
    ${lines.join("\n    ")}
    <text x="540" y="${H - 90}" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" fill="#8d8da0">Full roster: benkix-netizen.github.io/neo-availability/roster.html</text>
  </svg>`;
}

function downloadStoryPng(svgString, filename) {
  const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = 1080; canvas.height = 1920;
    canvas.getContext("2d").drawImage(img, 0, 0, 1080, 1920);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob => {
      const pngUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = pngUrl; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(pngUrl);
    }, "image/png");
  };
  img.onerror = () => { console.error("Failed to render story image"); URL.revokeObjectURL(url); };
  img.src = url;
}

function initPromoButtons(events, monthLabel) {
  const container = document.getElementById("promo-buttons");
  container.innerHTML = "";
  events.forEach(ev => {
    const dateLabel = formatDateDisplay(ev.date);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cal-btn small";
    btn.innerHTML = `Download <span class="promo-btn-dates">(${escapeHtml(dateLabel)})</span>`;
    btn.onclick = () => {
      const svg = buildStorySvg(ev, monthLabel);
      downloadStoryPng(svg, `Neo-${slugify(monthLabel)}-${slugify(dateLabel)}.png`);
    };
    container.appendChild(btn);
  });
}

// ---- rendering ----

let allEvents = [];
let emailMap = {};
let selectedName = "";
let currentSwapMap = {};
let currentMonthIdx = null;
let currentYear = null;

function buildTimeReportRow(slot, colSpan) {
  const tr = document.createElement("tr");
  const td = document.createElement("td");
  td.colSpan = colSpan;

  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "cal-btn report small";
  btn.textContent = "Report Actual Time";

  const form = document.createElement("div");
  form.className = "time-report-form";
  form.innerHTML = `
    <label>Actual start <input type="time" class="tr-start"></label>
    <label>Actual end <input type="time" class="tr-end"></label>
    <label>Note (optional) <input type="text" class="tr-note" placeholder="e.g. ran late"></label>
    <button type="button" class="cal-btn small tr-submit">Submit</button>
    <span class="tr-status"></span>
  `;

  btn.onclick = () => form.classList.toggle("show");

  form.querySelector(".tr-submit").addEventListener("click", async () => {
    const startVal = form.querySelector(".tr-start").value;
    const endVal = form.querySelector(".tr-end").value;
    const noteVal = form.querySelector(".tr-note").value.trim();
    const statusEl = form.querySelector(".tr-status");
    if (!startVal || !endVal) { statusEl.textContent = "Enter both times."; return; }

    const submitBtn = form.querySelector(".tr-submit");
    submitBtn.disabled = true;
    await postToScript({
      action: "reportTime",
      name: selectedName, email: emailMap[selectedName] || "",
      date: slot.date, role: slot.role,
      scheduledStart: slot.start, scheduledEnd: slot.end,
      actualStart: startVal, actualEnd: endVal, note: noteVal
    });
    statusEl.textContent = "Reported — thanks!";
    form.querySelector(".tr-start").disabled = true;
    form.querySelector(".tr-end").disabled = true;
    form.querySelector(".tr-note").disabled = true;
    submitBtn.disabled = true;
  });

  td.appendChild(btn);
  td.appendChild(form);
  tr.appendChild(td);
  return tr;
}

function buildActionsCell(slot) {
  const td = document.createElement("td");
  td.className = "actions-cell";
  const mine = selectedName && slot.assigned === selectedName;
  const swapKey = `${slot.date}|${slot.role}`;
  const openSwap = currentSwapMap[swapKey];

  if (mine) {
    const email = emailMap[selectedName];
    if (email) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cal-btn small";
      btn.textContent = "Add to Calendar";
      btn.onclick = () => {
        const vevent = buildVevent(slot, selectedName, email);
        if (vevent) downloadIcs(`Neo-${slot.role.replace(/\s+/g, "-")}-${slot.date}.ics`, [vevent]);
      };
      td.appendChild(btn);
    } else {
      const note = document.createElement("span");
      note.className = "no-email-note";
      note.textContent = "No email on file yet";
      td.appendChild(note);
    }

    if (openSwap) {
      const status = document.createElement("span");
      status.className = "swap-status";
      status.textContent = "Coverage requested — waiting for a volunteer";
      td.appendChild(status);
    } else {
      const swapBtn = document.createElement("button");
      swapBtn.type = "button";
      swapBtn.className = "cal-btn swap small";
      swapBtn.textContent = "Need Coverage";
      swapBtn.onclick = async () => {
        swapBtn.disabled = true;
        await postToScript({ action: "requestCoverage", name: selectedName, email: email || "", date: slot.date, role: slot.role });
        currentSwapMap[swapKey] = { requestedBy: selectedName, volunteers: [], date: slot.date, role: slot.role };
        render();
      };
      td.appendChild(swapBtn);
    }
  } else if (openSwap && selectedName && slot.assigned !== selectedName) {
    const already = openSwap.volunteers.includes(selectedName);
    const volBtn = document.createElement("button");
    volBtn.type = "button";
    volBtn.className = "cal-btn swap small";
    if (already) {
      volBtn.textContent = "You volunteered";
      volBtn.disabled = true;
    } else {
      volBtn.textContent = "I can cover this";
      volBtn.onclick = async () => {
        volBtn.disabled = true;
        await postToScript({ action: "volunteer", name: selectedName, email: emailMap[selectedName] || "", date: slot.date, role: slot.role });
        openSwap.volunteers.push(selectedName);
        render();
      };
    }
    td.appendChild(volBtn);
  }
  return td;
}

function buildAssignedCell(slot) {
  const td = document.createElement("td");
  const nameSpan = document.createElement("span");
  if (slot.assigned) {
    nameSpan.textContent = slot.assigned;
  } else {
    nameSpan.className = "assigned-blank";
    nameSpan.textContent = "unassigned";
  }
  td.appendChild(nameSpan);

  const openSwap = currentSwapMap[`${slot.date}|${slot.role}`];
  if (openSwap) {
    const badge = document.createElement("div");
    badge.className = "swap-badge";
    badge.textContent = "🔁 Needs coverage";
    td.appendChild(badge);
    if (openSwap.volunteers.length) {
      const vol = document.createElement("div");
      vol.className = "volunteer-list";
      vol.textContent = "Volunteered: " + openSwap.volunteers.join(", ");
      td.appendChild(vol);
    }
  }
  return td;
}

function renderRoleTable(slots, roleSet, caption) {
  const rows = slots.filter(s => roleSet.includes(s.role)).slice().sort((a, b) => {
    const roleDiff = roleSet.indexOf(a.role) - roleSet.indexOf(b.role);
    return roleDiff !== 0 ? roleDiff : timeSortKey(a.start) - timeSortKey(b.start);
  });
  if (rows.length === 0) return null;

  const table = document.createElement("table");
  const captionEl = document.createElement("caption");
  captionEl.textContent = caption;
  const thead = document.createElement("thead");
  thead.innerHTML = `<tr>
    <th class="time-col">Time</th>
    <th>Role</th>
    <th>Assigned</th>
    <th>Actions</th>
  </tr>`;
  const tbody = document.createElement("tbody");

  rows.forEach(s => {
    const mine = selectedName && s.assigned === selectedName;
    const tr = document.createElement("tr");
    if (mine) tr.className = "mine";

    const timeTd = document.createElement("td");
    timeTd.className = "time-col";
    timeTd.textContent = s.end ? `${formatShortTime(s.start)}–${formatShortTime(s.end)}` : formatShortTime(s.start);
    const roleTd = document.createElement("td");
    roleTd.textContent = s.role;

    tr.appendChild(timeTd);
    tr.appendChild(roleTd);
    tr.appendChild(buildAssignedCell(s));
    tr.appendChild(buildActionsCell(s));
    tbody.appendChild(tr);

    if (mine && slotHasPassed(s.date)) {
      tbody.appendChild(buildTimeReportRow(s, 4));
    }
  });

  table.appendChild(captionEl);
  table.appendChild(thead);
  table.appendChild(tbody);
  return table;
}

function updateMySetsBar() {
  const bar = document.getElementById("my-sets-bar");
  const msg = document.getElementById("my-sets-msg");
  const addAllBtn = document.getElementById("add-all-btn");

  if (!selectedName) { bar.classList.remove("show"); return; }

  const mySlots = allEvents.flatMap(ev => ev.slots.filter(s => s.assigned === selectedName));
  const email = emailMap[selectedName];
  bar.classList.add("show");

  if (mySlots.length === 0) {
    msg.textContent = "You don't have any sets on this roster yet.";
    addAllBtn.style.display = "none";
  } else if (!email) {
    msg.textContent = `${mySlots.length} set${mySlots.length === 1 ? "" : "s"} — no email on file yet. Submit your next availability form to enable calendar invites.`;
    addAllBtn.style.display = "none";
  } else {
    msg.textContent = `You have ${mySlots.length} set${mySlots.length === 1 ? "" : "s"} this month.`;
    addAllBtn.style.display = "inline-flex";
    addAllBtn.onclick = () => {
      const vevents = mySlots.map(s => buildVevent(s, selectedName, email)).filter(Boolean);
      downloadIcs(`Neo-${slugify(selectedName)}-all-sets.ics`, vevents);
    };
  }
}

function render() {
  const listEl = document.getElementById("event-list");
  listEl.innerHTML = "";

  if (allEvents.length === 0) {
    listEl.innerHTML = `<div class="empty-state">No Neo roster for ${MONTHS[currentMonthIdx]} ${currentYear} yet.</div>`;
    updateMySetsBar();
    return;
  }

  allEvents.forEach(ev => {
    const card = document.createElement("div");
    card.className = "event-card";
    const h2 = document.createElement("h2");
    h2.textContent = formatDateDisplay(ev.date);
    card.appendChild(h2);

    const entTable = renderRoleTable(ev.slots, ENTERTAINMENT_ROLES, "Entertainment");
    if (entTable) card.appendChild(entTable);
    const mediaTable = renderRoleTable(ev.slots, MEDIA_ROLES, "Media");
    if (mediaTable) card.appendChild(mediaTable);

    listEl.appendChild(card);
  });

  updateMySetsBar();
}

// Rebuilds the chip row centered on whatever month is being loaded (not
// fixed to "today") -- otherwise the chips go stale once Prev/Next moves
// past the original window.
function buildMonthChips(centerMonthIdx, centerYear) {
  const wrap = document.getElementById("month-picker");
  wrap.innerHTML = "";
  for (let i = -1; i <= 2; i++) {
    let idx = centerMonthIdx + i;
    let year = centerYear;
    if (idx < 0) { idx += 12; year -= 1; }
    if (idx > 11) { idx -= 12; year += 1; }
    const label = `${MONTHS[idx]} ${year}`;

    const btn = document.createElement("button");
    btn.className = "month-chip" + (i === 0 ? " active" : "");
    btn.textContent = label;
    btn.onclick = () => loadMonth(idx, year);
    wrap.appendChild(btn);
  }
}

function stepMonth(delta) {
  let idx = currentMonthIdx + delta;
  let year = currentYear;
  if (idx < 0) { idx += 12; year -= 1; }
  if (idx > 11) { idx -= 12; year += 1; }
  loadMonth(idx, year);
}

async function loadMonth(monthIdx, year) {
  buildMonthChips(monthIdx, year);
  currentMonthIdx = monthIdx;
  currentYear = year;

  const listEl = document.getElementById("event-list");
  listEl.innerHTML = `<div class="empty-state">Loading ${MONTHS[monthIdx]} ${year}…</div>`;

  const slots = await fetchMonthSlots(monthIdx, year);
  allEvents = slots ? groupIntoEvents(slots) : [];
  render();
  initPromoButtons(allEvents, `${MONTHS[monthIdx]} ${year}`);
}

async function main() {
  const [crew, swapRows] = await Promise.all([fetchCrew(), fetchCsvBySheetName(SWAP_SHEET_NAME, 1)]);
  emailMap = crew.emailMap;
  currentSwapMap = parseSwapMap(swapRows);

  const picker = document.getElementById("crew-picker");
  crew.names.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    picker.appendChild(opt);
  });
  picker.addEventListener("change", () => {
    selectedName = picker.value;
    render();
  });

  document.getElementById("month-prev").addEventListener("click", () => stepMonth(-1));
  document.getElementById("month-next").addEventListener("click", () => stepMonth(1));

  const now = new Date();
  await loadMonth(now.getMonth(), now.getFullYear());
}

main();
</script>
